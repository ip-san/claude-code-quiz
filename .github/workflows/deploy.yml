name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        task: [typecheck, lint, test, validate]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: typecheck
        if: matrix.task == 'typecheck'
        run: bunx tsc --noEmit && bunx type-coverage --strict --at-least 99
      - name: lint
        if: matrix.task == 'lint'
        run: bunx biome check src/ mcp/ scripts/
      - name: test
        if: matrix.task == 'test'
        run: bun run test
      - name: validate
        if: matrix.task == 'validate'
        run: node scripts/quiz-utils.mjs check && node scripts/validate-docs.mjs && node scripts/validate-docs-links.mjs

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:web
        env:
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web
      # On failure, annotate the commit so it's visible in GitHub UI
      - name: Annotate failure
        if: failure()
        run: echo "::error::check:all or build:web failed. Check logs above."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
